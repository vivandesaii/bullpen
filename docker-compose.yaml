# docker-compose.yml for Bullpen — FastAPI, PostgreSQL, Redis, and LocalStack

services:
  redis:
    image: redis:7.2-alpine
    container_name: my_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
      

  postgres:
    image: postgres:16-alpine
    container_name: my_database
    environment:
      POSTGRES_DB: bullpen
      POSTGRES_USER: bullpen_user
      POSTGRES_PASSWORD: securepassword
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bullpen_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

      
  localstack:
    image: localstack/localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs
      DEFAULT_REGION: ca-central-1
      PERSISTENCE: 1
    volumes:
      - localstack_data:/var/lib/localstack  

  api:
    build: 
      context: .
      dockerfile: Dockerfile
      target: runtime
    env_file: 
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://bullpen_user:securepassword@postgres:5432/bullpen
      SQS_QUEUE_URL: http://localstack:4566/000000000000/bullpen-trades-dev.fifo
      SQS_DLQ_URL: http://localstack:4566/000000000000/bullpen-trades-dev-dlq.fifo
    ports:
      - "8000:8000"
    depends_on:
      postgres: 
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_started
    volumes:
      - .:/app # Bind mounting for development purposes
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: python3 -m app.workers.trade_processor
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://bullpen_user:securepassword@postgres:5432/bullpen
      SQS_QUEUE_URL: http://localstack:4566/000000000000/bullpen-trades-dev.fifo
      SQS_DLQ_URL: http://localstack:4566/000000000000/bullpen-trades-dev-dlq.fifo
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      localstack:
        condition: service_started
    volumes:
      - .:/app # Bind mounting for development purposes

volumes:
  redis_data:
  postgres_data:
  localstack_data: